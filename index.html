<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>멤버 프로필</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border-s: rgba(0,0,0,0.15);
  --text: #1a1a1a;
  --sub: #666666;
  --muted: #aaaaaa;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --accent: #378ADD;
  --red: #E24B4A;
  --red-bg: #FCEBEB;
  --green-bg: #E1F5EE;
  --r: 14px;
  --rs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 공통 버튼/입력 ── */
.inp {
  width: 100%; border: 1.5px solid var(--border-s); border-radius: var(--rs);
  padding: 11px 13px; font-size: 15px; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none; transition: border-color .15s;
}
.inp:focus { border-color: var(--accent); background: #fff; }
.btn {
  width: 100%; border: none; border-radius: var(--rs); padding: 13px;
  font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: opacity .15s; touch-action: manipulation;
}
.btn:active { opacity: .8; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-out { background: none; border: 1.5px solid var(--border-s); color: var(--sub); }
.btn-sm { padding: 9px 16px; font-size: 13px; font-weight: 500; width: auto; border-radius: var(--rs); border: none; cursor: pointer; font-family: inherit; transition: opacity .15s; touch-action: manipulation; }
.btn-sm:active { opacity: .8; }
.btn-sm-blue { background: var(--blue); color: #fff; }
.btn-sm-ghost { background: none; border: 1.5px solid var(--border-s); color: var(--sub); }
.btn-sm-red { background: var(--red); color: #fff; }
.icon-btn {
  background: none; border: 1.5px solid var(--border-s); border-radius: 99px;
  padding: 7px 14px; font-size: 13px; color: var(--sub); cursor: pointer;
  font-family: inherit; touch-action: manipulation; transition: background .15s;
}
.icon-btn:active { background: var(--bg); }
.icon-btn-red { border-color: rgba(226,75,74,.4); color: var(--red); }
.divider { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0; }
.divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.field input, .field select, .field textarea {
  width: 100%; border: 1.5px solid var(--border-s); border-radius: var(--rs);
  padding: 9px 11px; font-size: 14px; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none; resize: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
.field textarea { height: 72px; }

/* ── 로딩 ── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 14px;
}
.spinner {
  width: 34px; height: 34px; border: 3px solid var(--border);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 그룹 목록 ── */
#screen-groups { display: none; min-height: 100vh; }
.gs-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px; }
.gs-title { font-size: 20px; font-weight: 700; }
.gs-body { padding: 20px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
.group-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.group-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 14px;
  transition: all .15s; touch-action: manipulation;
}
.group-card:active { background: var(--bg); }
.group-card-ava { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.group-card-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.group-card-meta { font-size: 12px; color: var(--muted); }
.action-list { display: flex; flex-direction: column; gap: 10px; }
.action-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 16px; cursor: pointer; display: flex; align-items: center; gap: 14px;
  transition: all .15s; touch-action: manipulation;
}
.action-card:active { background: var(--bg); }
.action-icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.action-label { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.action-desc { font-size: 12px; color: var(--muted); }
.join-form {
  display: none; margin-top: 14px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 16px;
}
.join-row { display: flex; gap: 8px; }
.join-row .inp { flex: 1; font-size: 15px; letter-spacing: .1em; }
.join-submit {
  background: var(--blue); border: none; border-radius: var(--rs);
  padding: 11px 18px; color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; touch-action: manipulation; white-space: nowrap;
}
.join-submit:active { opacity: .8; }

/* ── 닉네임 모달 ── */
.modal-wrap {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 400;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-wrap.show { display: flex; }
.modal-box { background: var(--surface); border-radius: 20px; padding: 24px; width: 100%; max-width: 320px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.modal-desc { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
.modal-btns { display: flex; gap: 8px; margin-top: 4px; }
.modal-btns button { flex: 1; }

/* ── 메인 ── */
#screen-main { display: none; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 20;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.back-btn {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--sub); padding: 4px; line-height: 1; touch-action: manipulation;
}
.topbar-info {}
.topbar-code { font-size: 11px; color: var(--muted); margin-bottom: 1px; }
.topbar-name { font-size: 16px; font-weight: 700; }
.topbar-name.owner-name { cursor: pointer; }
.topbar-name.owner-name:hover { color: var(--blue); }
.topbar-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.main-body { padding: 16px; }
.member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(158px, 1fr)); gap: 12px; align-items: start; }

/* ── 멤버 카드 ── */
.mcard {
  border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 14px 12px; cursor: pointer;
  transition: box-shadow .2s, opacity .2s, border-color .2s;
  position: relative; touch-action: manipulation;
}
.mcard.is-mine { border-color: rgba(55,138,221,.5); }
.mcard.expanded { box-shadow: 0 8px 28px rgba(0,0,0,.13); border-color: transparent; z-index: 5; }
.member-grid.has-expanded .mcard:not(.expanded) { opacity: .55; }
.card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.card-emoji { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; background: rgba(255,255,255,.6); }
.card-name { font-size: 14px; font-weight: 700; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.card-tag { font-size: 10px; padding: 3px 8px; border-radius: 99px; background: rgba(255,255,255,.55); color: var(--sub); }
.card-no-info { font-size: 11px; color: var(--muted); font-style: italic; }
.card-detail {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .3s ease, opacity .25s ease;
}
.mcard.expanded .card-detail { max-height: 300px; opacity: 1; }
.card-detail-divider { height: 1px; background: rgba(0,0,0,.07); margin: 10px 0; }
.card-detail-section { margin-bottom: 8px; }
.card-detail-label { font-size: 10px; font-weight: 700; color: var(--sub); opacity: .7; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .04em; }
.card-detail-text { font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.add-card-btn {
  border: 2px dashed var(--border-s); border-radius: var(--r);
  min-height: 110px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  background: none; cursor: pointer; color: var(--muted); font-size: 13px;
  font-family: inherit; width: 100%; touch-action: manipulation; transition: all .15s;
}
.add-card-btn:active { border-color: var(--accent); color: var(--sub); }

/* ── 프로필 시트 ── */
.sheet-wrap {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 100;
  align-items: flex-end; justify-content: center;
}
@media (min-width: 500px) { .sheet-wrap { align-items: center; padding: 16px; } }
.sheet-wrap.show { display: flex; }
.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 440px; max-height: 92vh; overflow-y: auto;
}
@media (min-width: 500px) { .sheet { border-radius: 20px; } }
.sheet-head { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.sheet-head-row { display: flex; align-items: flex-start; gap: 14px; }
.sheet-ava-btn { position: relative; cursor: pointer; flex-shrink: 0; border: none; background: none; padding: 0; touch-action: manipulation; }
.sheet-ava { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.sheet-ava-hint { position: absolute; bottom: -2px; right: -2px; background: var(--blue); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.sheet-name-area { flex: 1; padding-top: 4px; }
.sheet-name-row { display: flex; align-items: center; gap: 8px; }
.sheet-name { font-size: 18px; font-weight: 700; }
.sheet-edit-nick-btn { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--muted); padding: 0; line-height: 1; touch-action: manipulation; }
.sheet-nick-form { display: none; margin-top: 10px; }
.sheet-nick-form-row { display: flex; gap: 6px; }
.sheet-nick-form-row input { flex: 1; }

.sheet-tabs { display: flex; border-bottom: 1px solid var(--border); }
.sheet-tab {
  flex: 1; padding: 11px 0; text-align: center; font-size: 13px;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  font-family: inherit; background: none; border-top: none; border-left: none; border-right: none;
  touch-action: manipulation;
}
.sheet-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
.sheet-body { padding: 20px; min-height: 160px; }
.view-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
.view-label { font-size: 12px; color: var(--muted); min-width: 56px; padding-top: 1px; flex-shrink: 0; font-weight: 500; }
.view-val { font-size: 14px; color: var(--text); line-height: 1.6; }
.view-val.empty { color: var(--muted); font-style: italic; }
.sheet-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── 꾸미기 피커 ── */
.picker-wrap {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200;
  align-items: center; justify-content: center; padding: 16px;
}
.picker-wrap.show { display: flex; }
.picker-box { background: var(--surface); border-radius: 20px; padding: 22px; width: 100%; max-width: 340px; max-height: 88vh; overflow-y: auto; }
.picker-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.picker-preview { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding: 14px; border: 1px solid var(--border); border-radius: 12px; }
.picker-prev-ava { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.picker-prev-card { flex: 1; border-radius: 10px; padding: 10px; }
.picker-prev-name { font-size: 13px; font-weight: 700; }
.picker-section { margin-bottom: 18px; }
.picker-section label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.emoji-btn {
  width: 38px; height: 38px; border-radius: var(--rs);
  border: 1.5px solid var(--border); background: var(--bg);
  font-size: 19px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
.emoji-btn.selected { border-color: var(--blue); background: var(--blue-bg); }
.color-picker-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.color-picker-row input[type=color] { width: 46px; height: 46px; border: 2px solid var(--border-s); border-radius: 10px; cursor: pointer; padding: 2px; background: none; }
.color-presets { display: flex; flex-wrap: wrap; gap: 7px; }
.color-preset {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2.5px solid transparent; transition: transform .1s; touch-action: manipulation;
}
.color-preset:active { transform: scale(1.2); }
.color-preset.selected { border-color: var(--blue); }
.picker-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }

/* ── 코드 모달 ── */
.code-modal-wrap {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 300;
  align-items: center; justify-content: center; padding: 20px;
}
.code-modal-wrap.show { display: flex; }
.code-modal { background: var(--surface); border-radius: 20px; padding: 28px; width: 100%; max-width: 320px; text-align: center; }
.code-modal-icon { font-size: 44px; margin-bottom: 12px; }
.code-modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.code-modal-desc { font-size: 13px; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }
.code-display { background: var(--bg); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
.code-display-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.code-display-value { font-size: 38px; font-weight: 700; letter-spacing: 10px; color: var(--blue); }

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; color: #fff; border-radius: 99px;
  padding: 11px 22px; font-size: 13px;
  opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">연결 중...</div>
</div>

<!-- 그룹 목록 화면 -->
<div id="screen-groups">
  <div class="gs-header">
    <div class="gs-title">내 그룹</div>
  </div>
  <div class="gs-body">
    <div id="group-list-wrap" style="display:none;">
      <div class="section-label">참여 중인 그룹</div>
      <div class="group-list" id="group-list"></div>
    </div>
    <div class="section-label">그룹 추가</div>
    <div class="action-list">
      <div class="action-card" id="btn-new-group">
        <div class="action-icon" style="background:var(--blue-bg);">➕</div>
        <div>
          <div class="action-label">새 그룹 만들기</div>
          <div class="action-desc">새로운 그룹을 만들고 코드를 공유하세요</div>
        </div>
      </div>
      <div class="action-card" id="btn-join-group">
        <div class="action-icon" style="background:var(--green-bg);">🔑</div>
        <div>
          <div class="action-label">코드로 입장</div>
          <div class="action-desc">초대 코드를 입력해서 그룹에 참여하세요</div>
        </div>
      </div>
      <div class="join-form" id="join-form">
        <div class="field" style="margin-bottom:0;">
          <label>초대 코드</label>
          <div class="join-row">
            <input class="inp" id="code-inp" placeholder="코드 입력..." maxlength="8" autocomplete="off" style="text-transform:uppercase;letter-spacing:.1em;"/>
            <button class="join-submit" id="join-submit">입장</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 닉네임 모달 -->
<div class="modal-wrap" id="nick-modal">
  <div class="modal-box">
    <div class="modal-title" id="nick-modal-title">닉네임 입력</div>
    <div class="modal-desc" id="nick-modal-desc">이 그룹에서 사용할 닉네임을 입력하세요</div>
    <div class="field"><input class="inp" id="nick-modal-inp" placeholder="닉네임..." maxlength="10" autocomplete="off"/></div>
    <div class="modal-btns">
      <button class="btn btn-out btn-sm" id="nick-modal-cancel" style="width:auto;flex:1;">취소</button>
      <button class="btn btn-blue btn-sm" id="nick-modal-ok" style="width:auto;flex:1;">확인</button>
    </div>
  </div>
</div>

<!-- 코드 안내 모달 -->
<div class="code-modal-wrap" id="code-modal">
  <div class="code-modal">
    <div class="code-modal-icon">🎉</div>
    <div class="code-modal-title">그룹이 만들어졌어요!</div>
    <div class="code-modal-desc">아래 코드를 단톡방에 공유하세요<br>친구들이 코드로 입장할 수 있어요</div>
    <div class="code-display">
      <div class="code-display-label">그룹 초대 코드</div>
      <div class="code-display-value" id="code-display-val"></div>
    </div>
    <button class="btn btn-blue" id="code-copy-btn" style="margin-bottom:10px;">📋 코드 복사하기</button>
    <button class="btn btn-out" id="code-enter-btn">입장하기 →</button>
  </div>
</div>

<!-- 메인 화면 -->
<div id="screen-main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" id="back-btn">←</button>
      <div class="topbar-info">
        <div class="topbar-code" id="topbar-code"></div>
        <div class="topbar-name" id="topbar-name"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="share-btn">🔗 초대</button>
      <button class="icon-btn" id="leave-btn">나가기</button>
      <button class="icon-btn icon-btn-red" id="delete-room-btn" style="display:none;">방 삭제</button>
    </div>
  </div>
  <div class="main-body">
    <div class="member-grid" id="member-grid"></div>
  </div>
</div>

<!-- 프로필 시트 -->
<div class="sheet-wrap" id="sheet-wrap">
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div class="sheet-head-row">
        <button class="sheet-ava-btn" id="sheet-ava-btn">
          <div class="sheet-ava" id="sheet-ava"></div>
          <div class="sheet-ava-hint" id="sheet-ava-hint" style="display:none;">🎨</div>
        </button>
        <div class="sheet-name-area">
          <div class="sheet-name-row">
            <div class="sheet-name" id="sheet-name"></div>
            <button class="sheet-edit-nick-btn" id="sheet-edit-nick-btn" style="display:none;">✏️</button>
          </div>
          <div class="sheet-nick-form" id="sheet-nick-form">
            <div class="sheet-nick-form-row">
              <input class="inp" id="sheet-nick-inp" maxlength="10" placeholder="새 닉네임..." style="font-size:14px;padding:8px 10px;"/>
              <button class="btn-sm btn-sm-blue" id="sheet-nick-save">저장</button>
              <button class="btn-sm btn-sm-ghost" id="sheet-nick-cancel">✕</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="sheet-tabs">
      <button class="sheet-tab active" data-tab="0">기본 정보</button>
      <button class="sheet-tab" data-tab="1">관심사</button>
      <button class="sheet-tab" data-tab="2">소개</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-foot">

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase 초기화 ──
const db = getDatabase(initializeApp({
  apiKey: "AIzaSyCaWkZTIBLiAF-4FU3OJyEsOQSoonCikUk",
  authDomain: "hello-36a5e.firebaseapp.com",
  databaseURL: "https://hello-36a5e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hello-36a5e",
  storageBucket: "hello-36a5e.firebasestorage.app",
  messagingSenderId: "641573086591",
  appId: "1:641573086591:web:584726c8c9fa7f43dbe64a"
}));

// ── 상수 ──
const EMOJIS = ['😊','😎','🥳','🤓','😈','👻','🐱','🐶','🦊','🐸','🐼','🐯','🦁','🐧','🦄','🐙','🍀','⭐','🔥','💎','🎮','🎵','🏀','⚡'];
const COLORS = ['#B5D4F4','#9FE1CB','#F4C0D1','#FAC775','#C0DD97','#F5C4B3','#CECBF6','#ffd6d6','#d6f0ff','#fff3cc','#e8d6ff','#f0f0f0'];
const MBTI_LIST = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];

// ── 상태 ──
let myGroups = [];       // [{gid, gname, nick}]
let myUid = null;        // 이 기기의 고정 UID
let currentGid = null;   // 현재 방 코드
let members = {};        // 현재 방 멤버 데이터
let openUid = null;      // 열려있는 프로필 uid
let currentTab = 0;      // 현재 탭
let draft = {};          // 수정 임시 저장
let pickerEmoji = '';    // 피커 선택 이모지
let pickerColor = '';    // 피커 선택 색상
let membersListener = null;
let nameListener = null;
let pendingEntry = null;  // 코드 모달 후 진입할 그룹 정보
let nickModalCallback = null;

// ── 유틸 ──
const $ = id => document.getElementById(id);
const esc = s => (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
const genUid = () => 'u_' + Math.random().toString(36).slice(2, 10);
const genCode = () => Math.random().toString(36).slice(2, 8).toUpperCase();

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function loadGroups() {
  try { return JSON.parse(localStorage.getItem('mg3') || '[]'); } catch { return []; }
}
function saveGroups() {
  localStorage.setItem('mg3', JSON.stringify(myGroups));
}
function getOrCreateUid() {
  let u = localStorage.getItem('uid3');
  if (!u) { u = genUid(); localStorage.setItem('uid3', u); }
  return u;
}

// ── 화면 전환 ──
function showScreen(name) {
  ['screen-groups', 'screen-main'].forEach(id => $(id).style.display = 'none');
  $('screen-' + name).style.display = 'block';
}

// ── 초기화 ──
$('loading').style.display = 'none';
myUid = getOrCreateUid();
myGroups = loadGroups();
showScreen('groups');
renderGroupList();

// ── 그룹 목록 렌더 ──
function renderGroupList() {
  const wrap = $('group-list-wrap');
  const list = $('group-list');
  if (!myGroups.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = myGroups.map((g, i) => `
    <div class="group-card" data-idx="${i}">
      <div class="group-card-ava" style="background:${COLORS[i % COLORS.length]};">👥</div>
      <div style="flex:1;">
        <div class="group-card-name">${esc(g.gname || g.gid)}</div>
        <div class="group-card-meta">${esc(g.nick)} · 코드: ${g.gid}</div>
      </div>
      <div style="font-size:18px;color:var(--muted);">›</div>
    </div>`).join('');

  document.querySelectorAll('.group-card').forEach(el => {
    el.addEventListener('click', () => {
      const g = myGroups[+el.dataset.idx];
      enterMain(g.gid, g.nick);
    });
  });
}

// ── 닉네임 모달 ──
function askNick(title, desc, callback) {
  $('nick-modal-title').textContent = title;
  $('nick-modal-desc').textContent = desc;
  $('nick-modal-inp').value = '';
  nickModalCallback = callback;
  $('nick-modal').classList.add('show');
  setTimeout(() => $('nick-modal-inp').focus(), 150);
}

$('nick-modal-cancel').addEventListener('click', () => {
  $('nick-modal').classList.remove('show');
  nickModalCallback = null;
});

function confirmNick() {
  const nick = $('nick-modal-inp').value.trim();
  if (!nick) { showToast('닉네임을 입력해주세요'); return; }
  $('nick-modal').classList.remove('show');
  if (nickModalCallback) { nickModalCallback(nick); nickModalCallback = null; }
}

$('nick-modal-ok').addEventListener('click', confirmNick);
$('nick-modal-inp').addEventListener('keydown', e => { if (e.key === 'Enter') confirmNick(); });

// ── 새 그룹 만들기 ──
$('btn-new-group').addEventListener('click', () => {
  askNick('새 그룹 만들기', '이 그룹에서 사용할 닉네임을 입력하세요', async nick => {
    const code = genCode(), name = nick + '의 그룹';
    const md = {
      uid: myUid, nick, emoji: EMOJIS[0], cardBg: COLORS[0],
      mbti: '', location: '', games: '', intro: '', isOwner: true
    };
    try {
      await set(ref(db, `groups/${code}`), { name, owner: myUid, members: { [myUid]: md } });
      myGroups.push({ gid: code, gname: name, nick });
      saveGroups();
      pendingEntry = { code, name, nick };
      $('code-display-val').textContent = code;
      $('code-modal').classList.add('show');
    } catch (e) { showToast('오류가 발생했어요. 다시 시도해주세요.'); }
  });
});

// ── 코드로 입장 토글 ── (모바일 버그 수정: 터치와 클릭 분리)
let joinFormOpen = false;
function toggleJoinForm() {
  joinFormOpen = !joinFormOpen;
  $('join-form').style.display = joinFormOpen ? 'block' : 'none';
  if (joinFormOpen) setTimeout(() => $('code-inp').focus(), 100);
}

$('btn-join-group').addEventListener('click', e => {
  // 모바일에서 touchend → click 300ms 딜레이 방지
  if (e.detail === 0) return; // touch 이벤트로 이미 처리됨
  toggleJoinForm();
});
$('btn-join-group').addEventListener('touchend', e => {
  e.preventDefault();
  toggleJoinForm();
}, { passive: false });

// ── 그룹 입장 처리 ──
async function doJoinGroup() {
  const code = $('code-inp').value.trim().toUpperCase();
  if (!code) { showToast('코드를 입력해주세요'); return; }

  // 이미 로컬에 저장된 그룹이면 바로 입장
  const existing = myGroups.find(g => g.gid === code);
  if (existing) { enterMain(existing.gid, existing.nick); return; }

  try {
    const snap = await get(ref(db, `groups/${code}`));
    const data = snap.val();
    if (!data) { showToast('그룹을 찾을 수 없어요'); return; }

    // 이 기기 uid로 이미 가입된 경우 → 바로 입장
    if (data.members && data.members[myUid]) {
      const m = data.members[myUid];
      myGroups.push({ gid: code, gname: data.name || code, nick: m.nick });
      saveGroups();
      enterMain(code, m.nick);
      return;
    }

    // 닉네임 입력받기
    askNick(
      '그룹 입장',
      `"${data.name || code}"에서 사용할 닉네임을 입력하세요`,
      async nick => {
        const allMembers = data.members ? Object.entries(data.members) : [];

        // 같은 닉네임 멤버가 있는지 확인 (다른 기기에서 가입한 경우)
        const sameNick = allMembers.find(([k, v]) => v.nick === nick);

        if (sameNick) {
          const [existingKey, existingData] = sameNick;
          // 기존 프로필에 현재 uid 연결 (기존 키는 유지하되 uid만 업데이트)
          // → 현재 기기 uid로 새 키 만들고 기존 키 삭제
          const merged = { ...existingData, uid: myUid };
          const updates = { [myUid]: merged };
          if (existingKey !== myUid) updates[existingKey] = null;
          await update(ref(db, `groups/${code}/members`), updates);
          // 방장이었으면 owner도 업데이트
          if (existingData.isOwner) {
            await update(ref(db, `groups/${code}`), { owner: myUid });
          }
          myGroups.push({ gid: code, gname: data.name || code, nick });
          saveGroups();
          showToast('기존 프로필로 입장해요 😊');
          enterMain(code, nick);
        } else {
          // 완전 새 멤버
          const cnt = allMembers.length;
          if (cnt >= 8) { showToast('멤버가 꽉 찼어요 (최대 8명)'); return; }
          const md = {
            uid: myUid, nick,
            emoji: EMOJIS[cnt % EMOJIS.length],
            cardBg: COLORS[cnt % COLORS.length],
            mbti: '', location: '', games: '', intro: '', isOwner: false
          };
          await update(ref(db, `groups/${code}/members`), { [myUid]: md });
          myGroups.push({ gid: code, gname: data.name || code, nick });
          saveGroups();
          enterMain(code, nick);
        }
      }
    );
  } catch (e) { showToast('그룹을 찾을 수 없어요'); }
}

$('join-submit').addEventListener('click', doJoinGroup);
$('code-inp').addEventListener('keydown', e => { if (e.key === 'Enter') doJoinGroup(); });

// ── 코드 모달 ──
$('code-copy-btn').addEventListener('click', () => {
  const code = $('code-display-val').textContent;
  navigator.clipboard?.writeText(code)
    .then(() => showToast(`코드 ${code} 복사됨! 카톡에 붙여넣기 하세요 🔗`))
    .catch(() => showToast(`코드: ${code}`));
});
$('code-enter-btn').addEventListener('click', () => {
  $('code-modal').classList.remove('show');
  if (pendingEntry) { enterMain(pendingEntry.code, pendingEntry.nick); pendingEntry = null; }
});

// ── 메인 진입 ──
function enterMain(code, nick) {
  currentGid = code;
  $('join-form').style.display = 'none';
  $('code-inp').value = '';
  joinFormOpen = false;
  showScreen('main');
  $('topbar-code').textContent = `코드: ${code}`;

  // 기존 리스너 해제
  if (membersListener) { off(ref(db, `groups/${currentGid}/members`)); membersListener = null; }
  if (nameListener) { off(ref(db, `groups/${currentGid}/name`)); nameListener = null; }

  // 방 이름 리스너
  nameListener = onValue(ref(db, `groups/${code}/name`), snap => {
    const name = snap.val() || '멤버 프로필';
    $('topbar-name').textContent = name;
    const gIdx = myGroups.findIndex(g => g.gid === code);
    if (gIdx >= 0) { myGroups[gIdx].gname = name; saveGroups(); }
  });

  // 멤버 리스너
  membersListener = onValue(ref(db, `groups/${code}/members`), snap => {
    members = snap.val() || {};
    const me = members[myUid];
    const isOwner = me?.isOwner || false;

    // 방장 UI
    $('delete-room-btn').style.display = isOwner ? 'block' : 'none';
    const tn = $('topbar-name');
    tn.className = 'topbar-name' + (isOwner ? ' owner-name' : '');

    renderMemberGrid();
    if (openUid && members[openUid]) refreshSheet();
  });
}

// ← 뒤로가기
$('back-btn').addEventListener('click', () => {
  detachListeners();
  showScreen('groups');
  renderGroupList();
});

// 나가기 (로컬에서만 제거)
$('leave-btn').addEventListener('click', () => {
  if (!confirm('이 그룹에서 나가시겠어요?\n목록에서 삭제되지만 코드로 다시 입장할 수 있어요')) return;
  myGroups = myGroups.filter(g => g.gid !== currentGid);
  saveGroups();
  detachListeners();
  showScreen('groups');
  renderGroupList();
});

// 방 삭제 (방장만)
$('delete-room-btn').addEventListener('click', () => {
  if (!confirm('방을 완전히 삭제할까요?\n모든 데이터가 사라지고 복구할 수 없어요')) return;
  set(ref(db, `groups/${currentGid}`), null).then(() => {
    myGroups = myGroups.filter(g => g.gid !== currentGid);
    saveGroups();
    detachListeners();
    showToast('방이 삭제됐어요');
    showScreen('groups');
    renderGroupList();
  });
});

// 초대
$('share-btn').addEventListener('click', () => {
  navigator.clipboard?.writeText(`그룹 코드: ${currentGid}`)
    .then(() => showToast(`코드 ${currentGid} 복사됨! 카톡에 공유하세요 🔗`))
    .catch(() => showToast(`그룹 코드: ${currentGid}`));
});

// 방 이름 수정 (방장만)
$('topbar-name').addEventListener('click', () => {
  if (!members[myUid]?.isOwner) return;
  const cur = $('topbar-name').textContent;
  const t = prompt('방 제목을 입력하세요', cur);
  if (!t?.trim()) return;
  set(ref(db, `groups/${currentGid}/name`), t.trim())
    .then(() => showToast('방 제목 변경됐어요! ✅'));
});

function detachListeners() {
  if (membersListener) { off(ref(db, `groups/${currentGid}/members`)); membersListener = null; }
  if (nameListener) { off(ref(db, `groups/${currentGid}/name`)); nameListener = null; }
}

// ── 멤버 카드 렌더 ──
function renderMemberGrid() {
  const sorted = Object.values(members).sort((a, b) => (b.isOwner || 0) - (a.isOwner || 0));
  const grid = $('member-grid');

  let html = sorted.map(m => {
    const isMine = m.uid === myUid;
    const bg = m.cardBg || COLORS[0];
    const tags = [m.mbti, m.location].filter(Boolean);
    const hasDetail = !!(m.games || m.intro);
    const detail = hasDetail ? `
      <div class="card-detail">
        <div class="card-detail-divider"></div>
        ${m.games ? `<div class="card-detail-section"><div class="card-detail-label">관심사</div><div class="card-detail-text">${esc(m.games)}</div></div>` : ''}
        ${m.intro ? `<div class="card-detail-section"><div class="card-detail-label">소개</div><div class="card-detail-text">${esc(m.intro)}</div></div>` : ''}
      </div>` : '';
    return `
      <div class="mcard${isMine ? ' is-mine' : ''}" data-uid="${m.uid}" style="background:${bg};">
        <div class="card-top">
          <div class="card-emoji">${m.emoji}</div>
          <div class="card-name">${esc(m.nick)}${m.isOwner ? ' 👑' : ''}</div>
        </div>
        <div class="card-tags">
          ${tags.length ? tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('') : '<span class="card-no-info">프로필 없음</span>'}
        </div>
        ${detail}
      </div>`;
  }).join('');

  if (sorted.length < 8) html += `<button class="add-card-btn" id="add-member-btn"><span style="font-size:24px;">+</span><span>멤버 추가</span></button>`;

  grid.innerHTML = html;
  grid.classList.remove('has-expanded');

  // 카드 이벤트 (모바일/데스크탑 통합)
  document.querySelectorAll('.mcard').forEach(card => {
    let touchTimer = null, touchMoved = false, touchStartTime = 0;

    // 공통 활성화 함수
    function activateCard() {
      const isExpanded = card.classList.contains('expanded');
      // 이미 열려있으면 시트 열기
      if (isExpanded) { openProfile(card.dataset.uid); return; }
      // 다른 카드 닫기
      document.querySelectorAll('.mcard').forEach(c => c.classList.remove('expanded'));
      card.classList.add('expanded');
      grid.classList.add('has-expanded');
      // 바깥 탭하면 닫기
      setTimeout(() => {
        function closeOnOutside(e) {
          if (!card.contains(e.target)) {
            card.classList.remove('expanded');
            grid.classList.remove('has-expanded');
            document.removeEventListener('click', closeOnOutside);
            document.removeEventListener('touchend', closeOnOutside);
          }
        }
        document.addEventListener('click', closeOnOutside);
        document.addEventListener('touchend', closeOnOutside);
      }, 50);
    }

    // 데스크탑 클릭
    card.addEventListener('click', e => {
      if ('ontouchstart' in window) return;
      activateCard();
    });

    // 데스크탑 우클릭 → 내보내기 (방장만)
    card.addEventListener('contextmenu', e => {
      e.preventDefault();
      const uid = card.dataset.uid;
      const me = members[myUid];
      if (!me?.isOwner || uid === myUid) return;
      const nick = members[uid]?.nick || '';
      if (confirm(`'${nick}'님을 내보낼까요?`)) {
        set(ref(db, `groups/${currentGid}/members/${uid}`), null)
          .then(() => showToast(`${nick}님을 내보냈어요`));
      }
    });

    // 모바일 터치
    card.addEventListener('touchstart', e => {
      touchMoved = false;
      touchStartTime = Date.now();
      const uid = card.dataset.uid;
      touchTimer = setTimeout(() => {
        if (!touchMoved) {
          const me = members[myUid];
          if (me?.isOwner && uid !== myUid) {
            const nick = members[uid]?.nick || '';
            if (confirm(`'${nick}'님을 내보낼까요?`)) {
              set(ref(db, `groups/${currentGid}/members/${uid}`), null)
                .then(() => showToast(`${nick}님을 내보냈어요`));
            }
          }
        }
      }, 700);
    }, { passive: true });

    card.addEventListener('touchmove', () => {
      touchMoved = true;
      clearTimeout(touchTimer);
    }, { passive: true });

    card.addEventListener('touchend', e => {
      clearTimeout(touchTimer);
      if (!touchMoved && Date.now() - touchStartTime < 500) {
        e.preventDefault();
        activateCard();
      }
    }, { passive: false });
  });

  // 멤버 추가 버튼
  $('add-member-btn')?.addEventListener('click', () => {
    const nick = prompt('추가할 멤버 닉네임을 입력하세요');
    if (!nick?.trim()) return;
    const n = nick.trim();
    if (Object.values(members).find(m => m.nick === n)) { showToast('이미 있는 닉네임이에요'); return; }
    const cnt = Object.keys(members).length;
    const newUid = genUid();
    update(ref(db, `groups/${currentGid}/members`), {
      [newUid]: { uid: newUid, nick: n, emoji: EMOJIS[cnt % EMOJIS.length], cardBg: COLORS[cnt % COLORS.length], mbti: '', location: '', games: '', intro: '', isOwner: false }
    });
  });
}

// ── 프로필 시트 ──
function openProfile(uid) {
  openUid = uid;
  currentTab = 0;
  const m = members[uid] || {};
  draft = { mbti: m.mbti || '', location: m.location || '', games: m.games || '', intro: m.intro || '' };
  $('sheet-nick-form').style.display = 'none';
  document.querySelectorAll('.sheet-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  refreshSheet();
  $('sheet-wrap').classList.add('show');
}

function refreshSheet() {
  const m = members[openUid]; if (!m) return;
  const isMine = m.uid === myUid;
  const bg = m.cardBg || COLORS[0];
  $('sheet-ava').textContent = m.emoji;
  $('sheet-ava').style.background = bg;
  $('sheet-ava-hint').style.display = isMine ? 'flex' : 'none';
  $('sheet-name').textContent = m.nick + (m.isOwner ? ' 👑' : '');
  $('sheet-edit-nick-btn').style.display = isMine ? 'inline' : 'none';
  $('sheet-save-btn').style.display = isMine ? 'block' : 'none';
  renderSheetTab();
}

// 탭 전환
document.querySelectorAll('.sheet-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    saveDraft();
    currentTab = parseInt(tab.dataset.tab);
    document.querySelectorAll('.sheet-tab').forEach((t, i) => t.classList.toggle('active', i === currentTab));
    renderSheetTab();
  });
});

function saveDraft() {
  if ($('f-mbti')) draft.mbti = $('f-mbti').value;
  if ($('f-loc')) draft.location = $('f-loc').value.trim();
  if ($('f-games')) draft.games = $('f-games').value.trim();
  if ($('f-intro')) draft.intro = $('f-intro').value.trim();
}

function renderSheetTab() {
  const m = members[openUid]; if (!m) return;
  const isMine = m.uid === myUid;
  let html = '';
  if (currentTab === 0) {
    if (isMine) {
      const opts = MBTI_LIST.map(t => `<option value="${t}"${draft.mbti === t ? ' selected' : ''}>${t}</option>`).join('');
      html = `<div class="field"><label>MBTI</label><select id="f-mbti"><option value="">선택 안 함</option>${opts}</select></div>
              <div class="field"><label>사는 곳</label><input id="f-loc" value="${esc(draft.location)}" placeholder="예: 서울, 부산..."/></div>`;
    } else {
      html = viewRow('MBTI', m.mbti) + viewRow('사는 곳', m.location);
    }
  } else if (currentTab === 1) {
    if (isMine) {
      html = `<div class="field"><label>게임 / 관심사</label><textarea id="f-games" placeholder="예: 롤, 배그, 영화, 음악...">${esc(draft.games)}</textarea></div>`;
    } else {
      html = `<div class="view-row"><span class="view-label">관심사</span><span class="view-val${m.games ? '' : ' empty'}" style="white-space:pre-wrap;">${m.games || '미입력'}</span></div>`;
    }
  } else {
    if (isMine) {
      html = `<div class="field"><label>자기소개</label><textarea id="f-intro" placeholder="한 줄로 소개해보세요...">${esc(draft.intro)}</textarea></div>`;
    } else {
      html = `<div class="view-val${m.intro ? '' : ' empty'}" style="font-size:14px;line-height:1.7;white-space:pre-wrap;">${m.intro || '아직 소개가 없어요 😅'}</div>`;
    }
  }
  $('sheet-body').innerHTML = html;
}

function viewRow(label, val) {
  return `<div class="view-row"><span class="view-label">${label}</span><span class="view-val${val ? '' : ' empty'}">${val || '미입력'}</span></div>`;
}

// 저장
$('sheet-save-btn').addEventListener('click', () => {
  saveDraft();
  update(ref(db, `groups/${currentGid}/members/${openUid}`), {
    mbti: draft.mbti, location: draft.location, games: draft.games, intro: draft.intro
  }).then(() => showToast('저장됐어요! ✅')).catch(() => showToast('저장에 실패했어요'));
});

// 닫기
$('sheet-close-btn').addEventListener('click', closeSheet);
$('sheet-wrap').addEventListener('click', e => { if (e.target === $('sheet-wrap')) closeSheet(); });
function closeSheet() { $('sheet-wrap').classList.remove('show'); openUid = null; }

// 닉네임 수정 (uid 기반 - 키 변경 없이 필드만 업데이트)
$('sheet-edit-nick-btn').addEventListener('click', () => {
  const form = $('sheet-nick-form');
  const isVisible = form.style.display === 'block';
  form.style.display = isVisible ? 'none' : 'block';
  if (!isVisible) {
    $('sheet-nick-inp').value = members[openUid]?.nick || '';
    setTimeout(() => $('sheet-nick-inp').focus(), 100);
  }
});

async function saveNick() {
  const newNick = $('sheet-nick-inp').value.trim();
  if (!newNick) { showToast('닉네임을 입력해주세요'); return; }
  // uid 기반이라 그냥 update 하면 됨. 키 변경 없음!
  await update(ref(db, `groups/${currentGid}/members/${myUid}`), { nick: newNick });
  const idx = myGroups.findIndex(g => g.gid === currentGid);
  if (idx >= 0) { myGroups[idx].nick = newNick; saveGroups(); }
  $('sheet-nick-form').style.display = 'none';
  showToast('닉네임 변경됐어요! ✅');
}

$('sheet-nick-save').addEventListener('click', saveNick);
$('sheet-nick-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveNick();
  if (e.key === 'Escape') $('sheet-nick-form').style.display = 'none';
});
$('sheet-nick-cancel').addEventListener('click', () => { $('sheet-nick-form').style.display = 'none'; });

// ── 꾸미기 피커 ──
$('sheet-ava-btn').addEventListener('click', () => {
  if (openUid !== myUid) return;
  const m = members[myUid];
  pickerEmoji = m.emoji;
  pickerColor = m.cardBg || COLORS[0];
  buildEmojiGrid();
  buildColorPresets();
  $('color-picker-input').value = pickerColor;
  updatePickerPreview();
  $('picker-wrap').classList.add('show');
});

function buildEmojiGrid() {
  $('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn${e === pickerEmoji ? ' selected' : ''}" data-e="${e}">${e}</button>`
  ).join('');
  document.querySelectorAll('.emoji-btn').forEach(b => {
    b.addEventListener('click', () => { pickerEmoji = b.dataset.e; buildEmojiGrid(); updatePickerPreview(); });
  });
}

function buildColorPresets() {
  $('color-presets').innerHTML = COLORS.map(c =>
    `<div class="color-preset${c === pickerColor ? ' selected' : ''}" data-c="${c}" style="background:${c};"></div>`
  ).join('');
  document.querySelectorAll('.color-preset').forEach(b => {
    b.addEventListener('click', () => {
      pickerColor = b.dataset.c;
      $('color-picker-input').value = pickerColor;
      buildColorPresets();
      updatePickerPreview();
    });
  });
}

$('color-picker-input').addEventListener('input', e => {
  pickerColor = e.target.value;
  buildColorPresets();
  updatePickerPreview();
});

function updatePickerPreview() {
  const m = members[myUid] || {};
  $('prev-ava').textContent = pickerEmoji;
  $('prev-ava').style.background = pickerColor;
  $('prev-card').style.background = pickerColor;
  $('prev-name').textContent = m.nick || '';
}

$('picker-apply').addEventListener('click', () => {
  update(ref(db, `groups/${currentGid}/members/${myUid}`), { emoji: pickerEmoji, cardBg: pickerColor })
    .then(() => showToast('꾸미기 적용됐어요! ✅'));
  $('picker-wrap').classList.remove('show');
});

$('picker-cancel').addEventListener('click', () => $('picker-wrap').classList.remove('show'));
$('picker-wrap').addEventListener('click', e => { if (e.target === $('picker-wrap')) $('picker-wrap').classList.remove('show'); });
</script>
</body>
</html>
